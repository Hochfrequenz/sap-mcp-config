name: "Go Tests"

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.25.x", "1.26.x"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Test
        run: go test ./...
